<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRFSM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }

    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #toolbar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: all;
    }

    .btn {
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      background: rgba(10, 10, 20, 0.8);
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.15s;
      user-select: none;
    }

    .btn:hover { border-color: rgba(255,255,255,0.6); color: #fff; }
    .btn.active { background: rgba(74,144,217,0.4); border-color: #4a90d9; color: #fff; }

    #mode-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      text-align: center;
    }

    #trigger-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      pointer-events: all;
      max-width: 600px;
    }

    .trigger-btn {
      padding: 10px 18px;
      border: 1px solid rgba(0,255,136,0.5);
      border-radius: 20px;
      background: rgba(0,255,136,0.1);
      color: #00ff88;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.15s;
    }

    .trigger-btn:hover { background: rgba(0,255,136,0.25); border-color: #00ff88; }
    .trigger-btn:disabled { opacity: 0.3; cursor: default; }

    #context-menu {
      position: absolute;
      background: rgba(10,10,20,0.92);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 160px;
      pointer-events: all;
      backdrop-filter: blur(8px);
      display: none;
      z-index: 100;
    }

    .ctx-item {
      padding: 9px 16px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .ctx-item.danger { color: #ff6b6b; }
    .ctx-item.danger:hover { background: rgba(255,107,107,0.1); }
    .ctx-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }

    #dialog-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      display: none;
      z-index: 200;
    }

    #dialog {
      background: rgba(15,15,30,0.97);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 24px;
      width: 320px;
      backdrop-filter: blur(16px);
    }

    #dialog h3 { font-size: 15px; margin-bottom: 14px; color: #fff; }

    #dialog input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    #dialog input:focus { border-color: #4a90d9; }

    #dialog textarea {
      width: 100%;
      min-height: 132px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      resize: vertical;
      font-family: inherit;
      display: none;
    }
    #dialog textarea:focus { border-color: #4a90d9; }

    #dialog .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #dialog .dialog-actions .btn { padding: 8px 16px; }
    #dialog .dialog-actions .btn.primary { background: rgba(74,144,217,0.4); border-color: #4a90d9; color: #fff; }

    #toast {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 13px;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #edge-preview-hint {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(74,144,217,0.2);
      border: 1px solid rgba(74,144,217,0.5);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 13px;
      color: #4a90d9;
      pointer-events: none;
      display: none;
    }

    #vr-btn-container {
      position: absolute;
      bottom: 24px;
      right: 24px;
      pointer-events: all;
    }

    #save-indicator {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    #p2p-indicator {
      position: absolute;
      top: 34px;
      right: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.42);
      pointer-events: none;
    }

    #action-panel {
      position: absolute;
      top: 72px;
      left: 16px;
      max-width: 340px;
      padding: 14px 16px;
      background: rgba(10, 10, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      pointer-events: none;
      display: none;
    }

    #action-panel h3 {
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }

    #action-panel-name {
      font-size: 15px;
      color: #fff;
      margin-bottom: 8px;
    }

    #action-panel-body {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.78);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="toolbar">
      <button class="btn active" id="btn-edit">編集</button>
      <button class="btn" id="btn-run">実行</button>
      <button class="btn" id="btn-add-state">新規状態</button>
      <button class="btn" id="btn-p2p">P2P</button>
      <button class="btn" id="btn-reset">リセット</button>
      <button class="btn" id="btn-clear">クリア</button>
      <button class="btn" id="btn-export">Export</button>
      <button class="btn" id="btn-import">Import</button>
      <input id="file-import" type="file" accept="application/json,.json" hidden />
    </div>

    <div id="mode-hint">右クリック or 空白クリックでノード追加 / ノードをドラッグで移動</div>

    <div id="trigger-panel"></div>

    <div id="edge-preview-hint">接続先のノードをクリック（Escでキャンセル）</div>

    <div id="context-menu"></div>

    <div id="dialog-overlay">
      <div id="dialog">
        <h3 id="dialog-title"></h3>
        <input id="dialog-input" type="text" />
        <textarea id="dialog-textarea"></textarea>
        <div class="dialog-actions">
          <button class="btn" id="dialog-cancel">キャンセル</button>
          <button class="btn primary" id="dialog-ok">OK</button>
        </div>
      </div>
    </div>

    <div id="action-panel">
      <h3>Action</h3>
      <div id="action-panel-name"></div>
      <div id="action-panel-body"></div>
    </div>

    <div id="toast"></div>
    <div id="save-indicator">保存済み</div>
    <div id="p2p-indicator">P2P オフ</div>
    <div id="vr-btn-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
